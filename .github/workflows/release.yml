# Sport Machine — automatikus Windows-telepítő build (Steam-szerű letöltéshez).
#
# Mit csinál: a GitHub saját Windows-gépén legyártja a TELJES telepítőt
# (Flutter app + becsomagolt Python-motor + YOLO-súly egyben), lefuttatja a
# teszteket és a motor füsttesztjét, majd:
#   - minden futásnál feltölti a telepítőt build-artifactként,
#   - "v*" címke (tag) pusholásakor kiteszi a Releases oldalra is.
#
# Kiadás KÉTFÉLE módon indítható:
#  1. Actions → "release" → Run workflow → a "version" mezőbe pl. 0.1.2 →
#     teljes kiadás készül (címke + Releases-feltöltés is). Üres verzióval
#     csak próba-build készül, kiadás nélkül.
#  2. v* címke pusholásával (git tag v0.1.2 && git push origin v0.1.2).

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Kiadás verziószáma (pl. 0.1.2). Üresen: csak próba-build."
        required: false
        default: ""
      platforms:
        description: "Melyik csomag készüljön (a macOS futtató 10x Actions-percet fogyaszt — iterálás közben érdemes szűkíteni)"
        required: false
        default: "all"
        type: choice
        options: ["all", "windows", "macos"]
  push:
    tags: ["v*"]          # verziócímkére automatikus kiadás (minden platform)

# A Releases oldalra való feltöltéshez írási jog kell a repó tartalmához —
# enélkül a kiadás-lépés "Resource not accessible by integration" hibát ad.
permissions:
  contents: write

# A kiadandó címke egységesen: tag-indításnál a címke neve, kézi indításnál
# a megadott versionből képzett "vX.Y.Z"; üres, ha nem kell kiadni.
env:
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || (github.event.inputs.version != '' && format('v{0}', github.event.inputs.version) || '') }}

jobs:
  # Gyors ellenőrzés: a backend tesztjei (olcsó ubuntu-gépen).
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Teszt-függőségek
        run: pip install pytest numpy opencv-python-headless
      - name: Backend tesztek
        working-directory: backend
        run: python -m pytest -q

  # A teljes Windows-telepítő legyártása.
  windows-installer:
    needs: tests
    # Csak ha kérték (platforms: all/windows); címke-indításnál mindig.
    if: ${{ github.event.inputs.platforms == '' || github.event.inputs.platforms == null || github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows' }}
    runs-on: windows-latest
    # Szoros plafon: egy beragadt job feleslegesen égetné az Actions-percet
    # (a build normál esetben ~25 perc).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ---- Motor (Python backend) becsomagolása ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Backend + ML függőségek + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[ml]" uvicorn pyinstaller
      - name: YOLO súlyfájl letöltése a csomagba
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packaging\weights | Out-Null
          Push-Location packaging\weights
          python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')"
          Pop-Location
          if (-not (Test-Path packaging\weights\yolov8n.pt)) { throw "sulyfajl hianyzik" }
      - name: Motor becsomagolása (PyInstaller)
        run: pyinstaller packaging/backend.spec --noconfirm --distpath dist --workpath build/pyi
      - name: A becsomagolt súlyfájl épség-ellenőrzése
        # A sérült (csonka) modellfájl csak az ELSŐ feldolgozásnál derülne ki
        # a felhasználónál ("incorrect header check") — itt fogjuk meg.
        shell: pwsh
        run: |
          $w = Get-ChildItem -Recurse dist\handball_backend -Filter yolov8n.pt | Select-Object -First 1
          if (-not $w) { throw "nincs sulyfajl a csomagban" }
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]); print('sulyfajl OK:', sys.argv[1])" $w.FullName
      - name: Motor füstteszt (elindul és válaszol a /health-en)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist\handball_backend\handball_backend.exe" -PassThru
          $ok = $false
          foreach ($i in 1..30) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-WebRequest -Uri http://127.0.0.1:8000/health -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) { throw "A motor nem valaszolt a /health vegponton" }

      # ---- Flutter desktop app ----
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Windows platform-váz generálása (a repo csak a lib/-et tartalmazza)
        working-directory: client
        run: flutter create . --platforms=windows --project-name handball_client
      - name: Verziószám beírása (automatikus frissítéshez)
        # A kiadott app "tudja" a saját verzióját — ehhez képest nézi a
        # GitHub Releases-t, hogy van-e újabb. Fejlesztésben "0.0.0-dev" marad.
        if: env.RELEASE_TAG != ''
        shell: pwsh
        working-directory: client
        run: |
          $v = $env:RELEASE_TAG.TrimStart('v')
          Set-Content -Path lib\version.dart -Value "const String appVersion = `"$v`";"
          Get-Content lib\version.dart
      - name: Flutter build (Windows release)
        working-directory: client
        run: |
          flutter pub get
          flutter build windows --release

      # ---- Telepítő (Inno Setup) ----
      - name: Inno Setup telepítése
        run: choco install innosetup -y --no-progress
      - name: Telepítő fordítása
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\installer_windows.iss
          if (-not (Test-Path dist\installer\SportMachine-Setup.exe)) { throw "telepito nem keszult el" }

      # ---- Kimenetek ----
      - name: Telepítő feltöltése build-artifactként
        uses: actions/upload-artifact@v4
        with:
          name: SportMachine-Setup
          path: dist/installer/SportMachine-Setup.exe
          retention-days: 7

      - name: Kiadás a Releases oldalra
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/installer/SportMachine-Setup.exe
          body: |
            **Sport Machine — Windows telepítő**

            Letöltés után dupla kattintás a `SportMachine-Setup.exe`-re, majd
            Tovább → Telepítés. Részletes (laikus) útmutató: TELEPITES.md.

            Újdonságok e kiadásban: lásd a CHANGELOG.md-t a repó gyökerében.

  # A teljes macOS-alkalmazás legyártása (app + beágyazott motor, zip-ben).
  # FIGYELEM: a macOS futtató 10x szorzóval fogyasztja az Actions-percet —
  # ez viszi a kiadási költség ~85%-át; iterálás közben hagyd ki (platforms).
  macos-app:
    needs: tests
    # Csak ha kérték (platforms: all/macos); címke-indításnál mindig.
    if: ${{ github.event.inputs.platforms == '' || github.event.inputs.platforms == null || github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos' }}
    runs-on: macos-latest
    # Szoros plafon: egy beragadt macOS-job 10x szorzóval égetné a keretet
    # (a build normál esetben ~25 perc).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ---- Motor (Python backend) becsomagolása ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Backend + ML függőségek + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[ml]" uvicorn pyinstaller
      - name: YOLO súlyfájl letöltése a csomagba
        run: |
          mkdir -p packaging/weights
          (cd packaging/weights && python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')")
          test -f packaging/weights/yolov8n.pt
      - name: Motor becsomagolása (PyInstaller)
        run: pyinstaller packaging/backend.spec --noconfirm --distpath dist --workpath build/pyi
      - name: A becsomagolt súlyfájl épség-ellenőrzése
        # A sérült (csonka) modellfájl csak az ELSŐ feldolgozásnál derülne ki
        # a felhasználónál ("incorrect header check") — itt fogjuk meg.
        run: |
          W=$(find dist/handball_backend -name yolov8n.pt | head -1)
          test -n "$W"
          python -c "import zipfile,sys; zipfile.ZipFile(sys.argv[1]); print('sulyfajl OK:', sys.argv[1])" "$W"
      - name: Motor füstteszt (elindul és válaszol a /health-en)
        run: |
          ./dist/handball_backend/handball_backend & echo $! > engine.pid
          ok=0
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://127.0.0.1:8000/health; then ok=1; break; fi
          done
          kill "$(cat engine.pid)" 2>/dev/null || true
          [ "$ok" = "1" ]

      # ---- Flutter desktop app ----
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: macOS platform-váz generálása
        working-directory: client
        run: |
          flutter config --enable-macos-desktop
          flutter create . --platforms=macos --project-name handball_client
      - name: Sandbox kikapcsolása (App Store-on kívüli terjesztés)
        # A Flutter alapból bekapcsolja az App Sandboxot — az viszont tiltaná a
        # beágyazott motor indítását és a localhost-szervert. A pontokat tartalmazó
        # kulcs miatt PlistBuddy kell (a plutil a pontot útvonal-elválasztónak veszi).
        working-directory: client
        run: |
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" macos/Runner/Release.entitlements
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" macos/Runner/DebugProfile.entitlements
      - name: Verziószám beírása (automatikus frissítéshez)
        # A kiadott app "tudja" a saját verzióját — ehhez képest nézi a
        # GitHub Releases-t, hogy van-e újabb. Fejlesztésben "0.0.0-dev" marad.
        if: env.RELEASE_TAG != ''
        working-directory: client
        run: |
          printf 'const String appVersion = "%s";\n' "${RELEASE_TAG#v}" > lib/version.dart
          cat lib/version.dart
      - name: Flutter build (macOS release)
        working-directory: client
        run: |
          flutter pub get
          flutter build macos --release
      - name: Motor beágyazása az app-ba + ad-hoc aláírás + zip
        # A motor a Resources/engine mappába kerül — pontosan oda, ahol a
        # backend_launcher keresi. A beágyazás után a csomagot újra alá kell írni
        # (ad-hoc; Apple Developer aláírás/notarizálás később).
        run: |
          APP="client/build/macos/Build/Products/Release/handball_client.app"
          test -d "$APP"
          mkdir -p "$APP/Contents/Resources/engine"
          cp -R dist/handball_backend/. "$APP/Contents/Resources/engine/"
          codesign --force --deep -s - "$APP"
          ditto -c -k --keepParent "$APP" SportMachine-macOS.zip
          ls -lh SportMachine-macOS.zip

      # ---- Kimenetek ----
      - name: App feltöltése build-artifactként
        uses: actions/upload-artifact@v4
        with:
          name: SportMachine-macOS
          path: SportMachine-macOS.zip
          retention-days: 7

      - name: Kiadás a Releases oldalra
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: SportMachine-macOS.zip
